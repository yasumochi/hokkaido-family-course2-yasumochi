<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スポット詳細カード 確認用デモ | やすもち</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --green-ink:#385648; --green-mid:#6e8979; --green:#e8f2ed;
      --yellow:#fff8d9; --pink:#fde6df; --pink-strong:#f3bcc8;
      --page-bg:#fffdf8; --line:#dfe9e3; --accent:#a45f70;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    body{font-family:'Noto Sans JP',sans-serif; background:var(--page-bg); color:var(--green-ink); line-height:1.8; padding:24px 16px 80px;}
    .wrap{max-width:480px; margin:0 auto;}
    .demo-head{text-align:center; margin-bottom:8px;}
    .demo-head h1{font-size:1.3rem; color:var(--green-ink); margin-bottom:6px;}
    .demo-head p{font-size:0.82rem; color:var(--green-mid);}
    .demo-note{background:var(--yellow); border-radius:12px; padding:14px 16px; font-size:0.8rem; margin:16px 0 28px; line-height:1.7;}

    /* スポットカード（kokimamaレイアウト準拠） */
    .spot-card{background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 8px 22px #0f3d2e14; margin-bottom:36px;}
    .spot-num{text-align:center; font-size:0.7rem; letter-spacing:0.1em; color:var(--green-mid); padding:10px 0 4px; font-weight:700;}
    .spot-name{font-size:1.15rem; font-weight:900; color:var(--green-ink); padding:0 18px 12px;}
    .spot-img{width:100%; aspect-ratio:16/10; object-fit:cover; display:block;}
    .spot-headline{background:var(--pink); color:var(--accent); font-weight:700; font-size:0.92rem; padding:12px 18px; line-height:1.6;}
    .spot-body{padding:16px 18px;}
    .blk-title{font-weight:800; color:var(--green-ink); font-size:0.9rem; margin:4px 0 8px; display:flex; align-items:center; gap:6px;}
    .points{list-style:none; margin:0 0 16px;}
    .points li{position:relative; padding-left:20px; font-size:0.86rem; color:#444; margin-bottom:7px; line-height:1.6;}
    .points li::before{content:"★"; position:absolute; left:0; color:var(--green-ink); font-size:0.75rem;}
    .baby{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
    .baby span{font-size:0.72rem; background:var(--green); color:var(--green-ink); border-radius:999px; padding:4px 11px; font-weight:700;}
    .voice{background:#fff; border-left:4px solid var(--accent); border-radius:8px; padding:11px 14px; margin-bottom:16px; display:flex; gap:10px; align-items:flex-start;}
    .voice img{width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0;}
    .voice p{font-size:0.82rem; color:#444; line-height:1.6;}
    .voice .vlabel{font-size:0.72rem; color:var(--accent); font-weight:700; margin-bottom:2px;}
    .budget{font-size:0.85rem; font-weight:700; color:var(--green-ink); margin-bottom:12px;}
    .data{font-size:0.8rem; color:#555; line-height:1.8; border-top:1px solid var(--line); padding-top:12px; margin-bottom:14px;}
    .data dt{font-weight:700; color:var(--green-mid); display:inline;}
    .btns{display:flex; flex-wrap:wrap; gap:8px;}
    .btn{display:inline-flex; align-items:center; gap:6px; padding:10px 16px; border-radius:999px; font-size:0.82rem; font-weight:700; text-decoration:none;}
    .btn-map{background:var(--green-ink); color:#fff;}
    .btn-official{background:#fff; color:var(--green-ink); border:1.5px solid var(--green-ink);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="demo-head">
      <h1>🗂️ スポット詳細カード 確認用デモ</h1>
      <p>spots-yasumochi.js を実際に表示したサンプルです</p>
    </div>
    <div class="demo-note">
      ⚠️ これは<strong>やすもち側の確認用デモ</strong>です。<br>
      各スポットに「専用の画像・見出し・本文」が入っているか、ここで確認できます。<br>
      こうきママさんサイトに組み込めば、同じデータでこのように表示されます。
    </div>
    <div id="spotList"></div>
  </div>

  <script src="spots-yasumochi.js"></script>
  <script>
    (function(){
      var spots = window.YASUMOCHI_SPOTS || [];
      var list = document.getElementById('spotList');
      var icon = "https://raw.githubusercontent.com/yasumochi/hokkaido-family-course2-yasumochi/main/images/me.jpg";

      spots.forEach(function(s, i){
        var baby = s.baby || {};
        var babyTags = '';
        if(baby.nursing) babyTags += '<span>授乳室：'+baby.nursing+'</span>';
        if(baby.diaper) babyTags += '<span>おむつ替え：'+baby.diaper+'</span>';
        if(baby.stroller) babyTags += '<span>ベビーカー：'+baby.stroller+'</span>';

        var points = (s.points||[]).map(function(p){return '<li>'+p+'</li>';}).join('');

        var card =
          '<div class="spot-card">' +
            '<div class="spot-num">SPOT '+(i+1)+'</div>' +
            '<div class="spot-name">'+s.name+'</div>' +
            '<img class="spot-img" src="'+s.image+'" alt="'+s.name+'" loading="lazy" />' +
            '<div class="spot-headline">'+s.headline+'</div>' +
            '<div class="spot-body">' +
              '<p class="blk-title">📌 やすもちのオススメポイント</p>' +
              '<ul class="points">'+points+'</ul>' +
              '<p class="blk-title">🍼 乳幼児設備</p>' +
              '<div class="baby">'+babyTags+'</div>' +
              '<div class="voice">' +
                '<img src="'+icon+'" alt="やすもち" />' +
                '<div><p class="vlabel">やすもちの声</p><p>'+s.voice+'</p></div>' +
              '</div>' +
              '<p class="budget">💰 予算：'+s.budget+'</p>' +
              '<dl class="data">' +
                '<dt>住所</dt> '+s.address+'<br>' +
                '<dt>電話</dt> '+s.tel+'<br>' +
                '<dt>営業時間</dt> '+s.hours +
              '</dl>' +
              '<div class="btns">' +
                '<a class="btn btn-map" href="'+s.map+'" target="_blank" rel="noopener">📍 地図</a>' +
                '<a class="btn btn-official" href="'+s.official+'" target="_blank" rel="noopener">🔗 公式ページ</a>' +
              '</div>' +
            '</div>' +
          '</div>';
        list.insertAdjacentHTML('beforeend', card);
      });

      if(!spots.length){
        list.innerHTML = '<p style="text-align:center;color:#999;">スポットデータが読み込めませんでした</p>';
      }
    })();
  </script>
</body>
</html>
